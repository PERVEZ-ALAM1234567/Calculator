<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A modern and stylish calculator with night view theme">
    <meta name="author" content="Your Name">
    <meta name="keywords" content="Calculator, HTML5, CSS, Modern Design">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="container">
        <h1 class="title">Calculator</h1>
        
        <section class="input-area">
            <input id="num1" type="number" placeholder="Enter number 1" class="input-field">
            <input id="num2" type="number" placeholder="Enter number 2" class="input-field">
        </section>

        <section class="button-area">
            <button id="Add" class="btn operator">+</button>
            <button id="Subtract" class="btn operator">-</button>
            <button id="Multiply" class="btn operator">*</button>
            <button id="Divide" class="btn operator">/</button>
            <button id="Percentage" class="btn operator">%</button>
            <button id="Equal_to" class="btn equal">=</button>
            <button id="Reset" class="btn reset">Reset</button>
        </section>

        <h2 id="Answer" class="answer">Answer: 0</h2>

        <section class="number-buttons">
            <button class="btn number">1</button>
            <button class="btn number">2</button>
            <button class="btn number">3</button>
            <button class="btn number">4</button>
            <button class="btn number">5</button>
            <button class="btn number">6</button>
            <button class="btn number">7</button>
            <button class="btn number">8</button>
            <button class="btn number">9</button>
            <button class="btn number">0</button>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
